name: diagnose

# Временный диагностический workflow: собирает подробные логи Caddy и системы
# прямо с прод-сервера, чтобы понять почему не поднимается TLS на 443.
# Запускается вручную (workflow_dispatch).
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
    steps:
      - uses: actions/checkout@v4
      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
      - name: Собрать диагностику с сервера
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          export SSHPASS="$SSH_PASSWORD"
          sshpass -e ssh -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" '
            echo "########## spider-server ##########"
            systemctl status spider-server --no-pager -l 2>&1 | head -15
            echo
            echo "########## spider-server logs ##########"
            journalctl -u spider-server -n 15 --no-pager 2>&1
            echo
            echo "########## caddy service ##########"
            systemctl status caddy --no-pager -l 2>&1 | head -20
            echo
            echo "########## caddy logs (полные) ##########"
            journalctl -u caddy -n 60 --no-pager 2>&1
            echo
            echo "########## Caddyfile ##########"
            cat /etc/caddy/Caddyfile 2>&1
            echo
            echo "########## listening ports ##########"
            (ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null) | grep -E ":80|:443|:8080" 2>&1 || echo "ничего"
            echo
            echo "########## firewall (ufw) ##########"
            ufw status verbose 2>&1 || echo "ufw не установлен"
            echo
            echo "########## firewall (iptables) ##########"
            iptables -L INPUT -n --line-numbers 2>&1 | head -30
            echo
            echo "########## тест localhost:8080 ##########"
            curl -sS -m 5 http://127.0.0.1:8080/healthz 2>&1; echo
            echo "########## тест localhost:80 (Caddy) ##########"
            curl -sS -m 5 -I http://127.0.0.1:80/ 2>&1 | head -10
            echo "########## тест localhost:443 (Caddy TLS) ##########"
            curl -sS -m 5 -k -I https://127.0.0.1:443/ 2>&1 | head -10
            echo
            echo "########## сертификаты в /var/lib/caddy ##########"
            find /var/lib/caddy -name "*.crt" -o -name "*.json" 2>/dev/null | head -10 || echo "нет данных сертификатов"
            echo
            echo "########## DNS этого хоста ##########"
            curl -sS -m 5 ifconfig.me 2>&1; echo
            echo "########## память/диск ##########"
            free -m 2>&1 | head -3
            df -h / 2>&1 | head -3
          '
