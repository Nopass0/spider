name: deploy

# Автодеплой серверной части на прод при пуше в main.
# Секреты берутся ИСКЛЮЧИТЕЛЬНО из GitHub Actions secrets (не из репозитория!).
# См. docs/DEPLOY.md — какие секреты нужно задать.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to ${SSH_HOST}
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Build panel
        working-directory: panel
        run: |
          npm ci
          npm run build

      - name: Build server (linux/amd64, panel embedded)
        working-directory: server
        run: |
          rm -rf internal/panel/dist
          cp -r ../panel/dist internal/panel/dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -trimpath -ldflags "-s -w" -o ../spider-server ./cmd/spider

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Upload & install via SSH
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SPIDER_ADMIN_KEY: ${{ secrets.SPIDER_ADMIN_KEY }}
        run: |
          # Передаём бинарь и install.sh на сервер, запускаем установку.
          export SSHPASS="$SSH_PASSWORD"
          : "${SSH_HOST:?secret SSH_HOST не задан}"
          : "${SSH_USER:?secret SSH_USER не задан}"
          : "${SPIDER_ADMIN_KEY:?secret SPIDER_ADMIN_KEY не задан}"

          sshpass -e ssh -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" \
            "mkdir -p /tmp/spider-deploy"

          sshpass -e scp -o StrictHostKeyChecking=accept-new \
            spider-server deploy/install.sh deploy/Caddyfile deploy/spider-server.service \
            "$SSH_USER@$SSH_HOST:/tmp/spider-deploy/"

          sshpass -e ssh -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" \
            "SPIDER_ADMIN_KEY='$SPIDER_ADMIN_KEY' bash /tmp/spider-deploy/install.sh /tmp/spider-deploy/spider-server"

      - name: Health check + диагностика
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          # Ретраи: Caddy только что выпускает сертификат, нужно время.
          export SSHPASS="$SSH_PASSWORD"
          ok=0
          for i in $(seq 1 12); do
            echo "попытка $i/12…"
            if curl -fsS "https://spider.lowkey.su/healthz"; then ok=1; break; fi
            sleep 10
          done
          if [ "$ok" -ne 1 ]; then
            echo "⚠ сервер не ответил на healthz — собираю диагностику с сервера…"
            sshpass -e ssh -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" \
              'echo "=== spider-server ==="; systemctl status spider-server --no-pager -l | head -20; \
               echo "=== caddy ==="; systemctl status caddy --no-pager -l | head -25; \
               echo "=== caddy logs ==="; journalctl -u caddy -n 40 --no-pager; \
               echo "=== listening ports ==="; (ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null) | grep -E ":80|:443|:8080" || echo "ничего на 80/443/8080"; \
               echo "=== Caddyfile ==="; cat /etc/caddy/Caddyfile; \
               echo "=== firewall ==="; (ufw status 2>/dev/null || iptables -L INPUT -n 2>/dev/null | head -20) || echo "no firewall tooling";'
          fi
