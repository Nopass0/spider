name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Go server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage.out

  client:
    name: Rust client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client
      - run: cargo build --release --no-default-features --features autostart,self-update,screen
      # Тесты БЕЗ tray (tray-icon тянет GTK — недоступен на headless ubuntu runner).
      # tray-feature тестируется локально/в release на Windows runner.
      - run: cargo test --no-default-features --features autostart,self-update,screen
      - run: cargo clippy --no-default-features --features autostart,self-update,screen -- -D warnings
        continue-on-error: true

  panel:
    name: Panel tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: panel/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
